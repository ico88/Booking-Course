{% extends "base.html" %}
{% block title %}Recupera password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
  <h1 class="text-2xl font-bold text-center mb-8">Recupera la password</h1>
  <form method="POST" class="bg-white border border-gray-200 rounded-xl p-8 space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p class="text-sm text-gray-600">Inserisci la tua email e ti invieremo un link per reimpostare la password.</p>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800">Invia link</button>
  </form>
  <div class="text-center mt-4 text-sm">
    <a href="{{ url_for('auth.login') }}" class="text-blue-700 hover:underline">← Torna al login</a>
  </div>
</div>
{% endblock %}
