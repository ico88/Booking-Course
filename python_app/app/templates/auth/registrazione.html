{% extends "base.html" %}
{% block title %}Registrati{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
  <h1 class="text-2xl font-bold text-center mb-8">Crea un account</h1>
  <form method="POST" class="bg-white border border-gray-200 rounded-xl p-8 space-y-4" id="form-reg">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium mb-1">Nome *</label>
        <input type="text" name="nome" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Cognome *</label>
        <input type="text" name="cognome" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email *</label>
      <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password * (min. 8 caratteri)</label>
      <input type="password" name="password" id="reg_password" required minlength="8" autocomplete="new-password" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      <div id="strength-bar" class="mt-2 h-1.5 rounded-full bg-gray-200 overflow-hidden hidden">
        <div id="strength-fill" class="h-full rounded-full transition-all duration-300 w-0"></div>
      </div>
      <p id="strength-label" class="text-xs mt-1 hidden"></p>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Conferma password *</label>
      <input type="password" name="conferma_password" id="reg_conferma" required minlength="8" autocomplete="new-password" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      <p id="match-msg" class="text-xs mt-1 hidden"></p>
    </div>
    <div class="space-y-2 pt-2">
      <label class="flex items-start gap-2 cursor-pointer">
        <input type="checkbox" name="eta_minima" required class="mt-0.5">
        <span class="text-sm text-gray-700">Dichiaro di avere almeno <strong>16 anni</strong> *</span>
      </label>
      <label class="flex items-start gap-2 cursor-pointer">
        <input type="checkbox" name="consenso_privacy" required class="mt-0.5">
        <span class="text-sm text-gray-700">Ho letto e accetto la <a href="{{ url_for('public.privacy_policy') }}" class="text-blue-700 hover:underline" target="_blank">Privacy Policy</a> *</span>
      </label>
      <label class="flex items-start gap-2 cursor-pointer">
        <input type="checkbox" name="consenso_marketing" class="mt-0.5">
        <span class="text-sm text-gray-700">Accetto di ricevere comunicazioni di marketing sui corsi disponibili</span>
      </label>
    </div>
    {% if turnstile_site_key %}
    <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="light"></div>
    {% endif %}
    <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 mt-2">
      Registrati
    </button>
  </form>
  <div class="text-center mt-4 text-sm text-gray-500">
    Hai già un account? <a href="{{ url_for('auth.login') }}" class="text-blue-700 hover:underline">Accedi</a>
  </div>
</div>

<script>
(function () {
  const pw = document.getElementById('reg_password');
  const conf = document.getElementById('reg_conferma');
  const bar = document.getElementById('strength-bar');
  const fill = document.getElementById('strength-fill');
  const lbl = document.getElementById('strength-label');
  const matchMsg = document.getElementById('match-msg');

  const levels = [
    { label: 'Molto debole', color: '#ef4444', w: '20%' },
    { label: 'Debole',       color: '#f97316', w: '40%' },
    { label: 'Discreta',     color: '#eab308', w: '60%' },
    { label: 'Buona',        color: '#84cc16', w: '80%' },
    { label: 'Ottima',       color: '#22c55e', w: '100%' },
  ];

  function score(v) {
    let s = 0;
    if (v.length >= 8)  s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    return Math.min(s, 4);
  }

  pw.addEventListener('input', function () {
    const v = this.value;
    if (!v) { bar.classList.add('hidden'); lbl.classList.add('hidden'); return; }
    bar.classList.remove('hidden'); lbl.classList.remove('hidden');
    const lvl = levels[score(v)];
    fill.style.width = lvl.w;
    fill.style.backgroundColor = lvl.color;
    lbl.textContent = lvl.label;
    lbl.style.color = lvl.color;
    checkMatch();
  });

  function checkMatch() {
    if (!conf.value) { matchMsg.classList.add('hidden'); return; }
    matchMsg.classList.remove('hidden');
    if (pw.value === conf.value) {
      matchMsg.textContent = 'Le password coincidono ✓';
      matchMsg.style.color = '#16a34a';
    } else {
      matchMsg.textContent = 'Le password non coincidono';
      matchMsg.style.color = '#dc2626';
    }
  }

  conf.addEventListener('input', checkMatch);

  document.getElementById('form-reg').addEventListener('submit', function (e) {
    if (pw.value !== conf.value) {
      e.preventDefault();
      conf.focus();
      matchMsg.classList.remove('hidden');
      matchMsg.textContent = 'Le password non coincidono';
      matchMsg.style.color = '#dc2626';
    }
  });
})();
</script>
{% endblock %}
{% block scripts %}
{% if turnstile_site_key %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
{% endif %}
{% endblock %}
