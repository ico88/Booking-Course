{% extends "base.html" %}
{% block title %}Nuova password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
  <h1 class="text-2xl font-bold text-center mb-8">Imposta nuova password</h1>
  <form method="POST" class="bg-white border border-gray-200 rounded-xl p-8 space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">
    <div>
      <label class="block text-sm font-medium mb-1">Nuova password (min. 8 caratteri)</label>
      <input type="password" name="password" required minlength="8" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Conferma password</label>
      <input type="password" name="conferma_password" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800">Salva password</button>
  </form>
</div>
{% endblock %}
