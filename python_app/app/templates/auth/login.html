{% extends "base.html" %}
{% block title %}Accedi{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
  <h1 class="text-2xl font-bold text-center mb-8">Accedi al tuo account</h1>
  <form method="POST" class="bg-white border border-gray-200 rounded-xl p-8 space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required autofocus
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800">
      Accedi
    </button>
  </form>
  <div class="text-center mt-4 space-y-2 text-sm">
    <div><a href="{{ url_for('auth.recupera_password') }}" class="text-blue-700 hover:underline">Password dimenticata?</a></div>
    <div class="text-gray-500">Non hai un account? <a href="{{ url_for('auth.registrazione') }}" class="text-blue-700 hover:underline">Registrati</a></div>
  </div>
</div>
{% endblock %}
