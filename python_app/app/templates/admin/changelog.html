{% extends "admin/base_admin.html" %}
{% block title %}Changelog{% endblock %}

{% block head %}
<style>
.changelog-body h2{font-size:1.25rem;font-weight:700;margin:2rem 0 .75rem;padding-bottom:.4rem;border-bottom:2px solid #e5e7eb;color:#111827}
.changelog-body h3{font-size:1rem;font-weight:600;margin:1.25rem 0 .4rem;color:#374151}
.changelog-body ul{list-style:disc;padding-left:1.4rem;margin:.4rem 0;space-y:.25rem}
.changelog-body li{margin:.2rem 0;font-size:.875rem;color:#374151}
.changelog-body strong{color:#111827}
.changelog-body p{font-size:.875rem;color:#6b7280;margin:.4rem 0}
.changelog-body code{background:#f3f4f6;border-radius:.25rem;padding:.1rem .35rem;font-size:.8rem;font-family:monospace}
.changelog-body hr{border:none;border-top:1px solid #e5e7eb;margin:2rem 0}
</style>
{% endblock %}

{% block admin_content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold">Changelog</h1>
    <p class="text-sm text-gray-500 mt-1">Cronologia delle versioni e modifiche</p>
  </div>
  <span class="inline-flex items-center gap-1.5 bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-xl">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
    </svg>
    v{{ version }}
  </span>
</div>

<div class="bg-white border border-gray-200 rounded-xl p-8 max-w-3xl">
  <div class="changelog-body">
    {{ changelog_html | safe }}
  </div>
</div>
{% endblock %}
