{% extends "dashboard/base_dashboard.html" %}
{% block title %}Dati personali{% endblock %}

{% block dashboard_content %}
<h1 class="text-2xl font-bold mb-6">Dati personali</h1>

<form method="POST" class="max-w-lg space-y-6">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">Nome</label>
        <input type="text" name="nome" value="{{ current_user.nome }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Cognome</label>
        <input type="text" name="cognome" value="{{ current_user.cognome }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" value="{{ current_user.email }}" disabled class="w-full border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 text-gray-500">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Telefono</label>
      <input type="tel" name="telefono" value="{{ current_user.telefono or '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Codice fiscale</label>
      <input type="text" name="codice_fiscale" value="{{ current_user.codice_fiscale or '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 uppercase">
    </div>
  </div>

  <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
    <h3 class="font-semibold">Cambia password</h3>
    <p class="text-sm text-gray-500">Lascia vuoto per non modificare</p>
    <div>
      <label class="block text-sm font-medium mb-1">Nuova password</label>
      <input type="password" name="nuova_password" minlength="8" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
    </div>
  </div>

  <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800">
    Salva modifiche
  </button>
</form>

<div class="mt-12 max-w-lg">
  <div class="border border-red-200 rounded-xl p-5">
    <h3 class="font-semibold text-red-700 mb-2">Elimina account</h3>
    <p class="text-sm text-gray-600 mb-3">Questa azione è irreversibile. Tutti i tuoi dati verranno eliminati.</p>
    <form method="POST" action="{{ url_for('dashboard.cancella_account') }}" onsubmit="return confirm('Sei sicuro? Questa azione non può essere annullata.')">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-700">
        Elimina il mio account
      </button>
    </form>
  </div>
</div>
{% endblock %}
