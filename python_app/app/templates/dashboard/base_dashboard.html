{% extends "base.html" %}

{% block main_class %}{% endblock %}

{% block content %}
<!-- Overlay mobile -->
<div id="dash-overlay" class="fixed inset-0 bg-black/40 z-20 hidden lg:hidden" onclick="closeDashSidebar()"></div>

<!-- Sidebar -->
<aside id="dash-sidebar" class="fixed inset-y-0 left-0 z-30 w-56 bg-white border-r border-gray-200 flex flex-col
  -translate-x-full lg:translate-x-0 transition-transform duration-200">
  <div class="px-4 pt-6 pb-4 border-b border-gray-100 flex items-start justify-between gap-2">
    <div class="min-w-0">
      <div class="font-semibold text-gray-900 truncate">{{ current_user.nome_completo }}</div>
      <div class="text-xs text-gray-500 truncate">{{ current_user.email }}</div>
    </div>
    <button onclick="closeDashSidebar()" class="lg:hidden text-gray-400 hover:text-gray-700 mt-0.5 shrink-0" aria-label="Chiudi menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="{{ url_for('dashboard.index') }}" onclick="closeDashSidebar()"
       class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {{ 'bg-blue-50 text-blue-700 font-medium' if request.endpoint == 'dashboard.index' else 'text-gray-700 hover:bg-gray-100' }}">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
      Le mie prenotazioni
    </a>
    <a href="{{ url_for('dashboard.dati_personali') }}" onclick="closeDashSidebar()"
       class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {{ 'bg-blue-50 text-blue-700 font-medium' if request.endpoint == 'dashboard.dati_personali' else 'text-gray-700 hover:bg-gray-100' }}">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Dati personali
    </a>
    <a href="{{ url_for('public.index') }}"
       class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Catalogo corsi
    </a>
    <a href="{{ url_for('dashboard.manuale') }}" onclick="closeDashSidebar()"
       class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {{ 'bg-blue-50 text-blue-700 font-medium' if request.endpoint == 'dashboard.manuale' else 'text-gray-700 hover:bg-gray-100' }}">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Manuale
    </a>
  </nav>
</aside>

<!-- Main content -->
<div class="lg:ml-56 min-h-screen flex flex-col">
  <!-- Topbar mobile -->
  <header class="lg:hidden sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3">
    <button onclick="openDashSidebar()" class="text-gray-600 hover:text-gray-900" aria-label="Apri menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span class="font-semibold text-sm text-gray-800 truncate">{{ current_user.nome_completo }}</span>
  </header>

  <main class="flex-1 p-4 lg:p-8 overflow-auto">
    {% block dashboard_content %}{% endblock %}
  </main>
</div>

<script>
function openDashSidebar() {
  document.getElementById('dash-sidebar').classList.remove('-translate-x-full');
  document.getElementById('dash-overlay').classList.remove('hidden');
}
function closeDashSidebar() {
  document.getElementById('dash-sidebar').classList.add('-translate-x-full');
  document.getElementById('dash-overlay').classList.add('hidden');
}
</script>
{% endblock %}
