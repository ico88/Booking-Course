{% extends "base.html" %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="flex min-h-screen">
  {# Sidebar #}
  <aside class="w-56 bg-white border-r border-gray-200 min-h-screen px-4 py-6 shrink-0">
    <div class="mb-6">
      <div class="font-semibold text-gray-900">{{ current_user.nome_completo }}</div>
      <div class="text-xs text-gray-500">{{ current_user.email }}</div>
    </div>
    <nav class="space-y-1">
      <a href="{{ url_for('dashboard.index') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {{ 'bg-blue-50 text-blue-700 font-medium' if request.endpoint == 'dashboard.index' else 'text-gray-700 hover:bg-gray-100' }}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
        Le mie prenotazioni
      </a>
      <a href="{{ url_for('dashboard.dati_personali') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm {{ 'bg-blue-50 text-blue-700 font-medium' if request.endpoint == 'dashboard.dati_personali' else 'text-gray-700 hover:bg-gray-100' }}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Dati personali
      </a>
      <a href="{{ url_for('public.index') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Catalogo corsi
      </a>
    </nav>
  </aside>

  {# Main #}
  <main class="flex-1 p-8 overflow-auto">
    {% block dashboard_content %}{% endblock %}
  </main>
</div>
{% endblock %}
