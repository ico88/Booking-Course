{% extends "base.html" %}
{% block title %}{{ titolo }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold mb-6 text-gray-900">{{ titolo }}</h1>
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
    <div class="px-8 py-8 prose prose-gray max-w-none
                prose-headings:font-semibold prose-headings:text-gray-900
                prose-h2:text-xl prose-h2:mt-8 prose-h2:mb-3 prose-h2:first:mt-0
                prose-h3:text-base prose-h3:mt-6 prose-h3:mb-2
                prose-p:text-gray-700 prose-p:leading-relaxed
                prose-ul:text-gray-700 prose-ol:text-gray-700
                prose-li:my-0.5
                prose-a:text-blue-600 prose-a:no-underline hover:prose-a:underline
                prose-strong:text-gray-900
                prose-code:bg-gray-100 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-sm prose-code:font-normal prose-code:before:content-none prose-code:after:content-none
                prose-table:text-sm prose-th:text-left prose-th:font-semibold prose-th:text-gray-700
                prose-td:text-gray-700">
      {{ content | safe }}
    </div>
  </div>
</div>
{% endblock %}
