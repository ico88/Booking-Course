{% extends "base.html" %}
{% block title %}Accesso non consentito{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m0 0v2m0-2h2m-2 0H10m2-9a4 4 0 00-4 4v1H6a2 2 0 00-2 2v5a2 2 0 002 2h12a2 2 0 002-2v-5a2 2 0 00-2-2h-2v-1a4 4 0 00-4-4z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Accesso non consentito</h1>
    <p class="text-gray-500 mb-6">Non hai i permessi per accedere a questa sezione. Se pensi sia un errore, contatta l'amministratore.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ url_for('public.index') }}"
         class="px-5 py-2.5 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors">
        Torna alla home
      </a>
      <button onclick="history.back()"
              class="px-5 py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">
        Pagina precedente
      </button>
    </div>
  </div>
</div>
{% endblock %}
