{% extends "base.html" %}
{% block title %}Pagina non trovata{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Pagina non trovata</h1>
    <p class="text-gray-500 mb-6">La pagina che stai cercando non esiste o è stata spostata.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ url_for('public.index') }}"
         class="px-5 py-2.5 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors">
        Torna alla home
      </a>
      <button onclick="history.back()"
              class="px-5 py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">
        Pagina precedente
      </button>
    </div>
  </div>
</div>
{% endblock %}
